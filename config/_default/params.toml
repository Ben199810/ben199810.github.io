colorScheme = "blowfish"
defaultAppearance = "dark" # 預設外觀主題，選項包括 "light"、"dark" 和 "auto"
autoSwitchAppearance = true

enableA11y = false
enableSearch = true
enableCodeCopy = true # 允許程式碼區塊複製按鈕
enableStructuredBreadcrumbs = false
# enableStyledScrollbar = true # 禁用以使用原生滾動條樣式（默認為 true）

replyByEmail = false

mainSections = [ "posts", "journals" ]
# robots = ""

disableImageOptimization = false
disableImageOptimizationMD = false
disableTextInHeader = false
# backgroundImageWidth = 1200

defaultBackgroundImage = "/img/background.svg" # 用作背景圖像的默認值
defaultFeaturedImage = "/img/featured.svg" # 用作特色圖像的默認值
# defaultSocialImage = "/android-chrome-512x512.png" # 用作社交媒體分享（Open Graph 和 Twitter）的默認值
hotlinkFeatureImage = false
# imagePosition = "50% 50%"

highlightCurrentMenuArea = true
smartTOC = true
smartTOCHideUnfocusedChildren = true

fingerprintAlgorithm = "sha512" # 有效值為 "sha512"（默認）、"sha384"、"sha256"

giteaDefaultServer = "https://git.fsfe.org"
forgejoDefaultServer = "https://v11.next.forgejo.org"

[header]
  layout = "basic" # 有效選項：basic、fixed、fixed-fill、fixed-gradient、fixed-fill-blur

[footer]
  showMenu = true
  showCopyright = true
  showThemeAttribution = true
  showAppearanceSwitcher = true
  showScrollToTop = true

# 首頁設定
[homepage]
  layout = "hero" # 首頁佈局選項：page、profile、hero、card、background、custom
  #homepageImage = "IMAGE.jpg" # 用於：hero 和 card
  showRecent = true
  showRecentItems = 9
  showMoreLink = true
  showMoreLinkDest = "/posts"
  cardView = true
  cardViewScreenWidth = false
  layoutBackgroundBlur = false # 僅在佈局等於 background 時使用
  disableHeroImageFilter = false # 僅在佈局等於 hero 時使用

[article]
  showDate = true
  showViews = false
  showLikes = false
  showDateOnlyInArticle = false
  showDateUpdated = true
  showAuthor = true
  # showAuthorBottom = false
  showHero = false
  showComments = true # 開啟文章評論功能
  heroStyle = "background" # 有效選項：basic、big、background、thumbAndBackground
  layoutBackgroundBlur = true # 僅在 heroStyle 等於 background 或 thumbAndBackground 時使用
  layoutBackgroundHeaderSpace = true # 僅在 heroStyle 等於 background 時使用
  showBreadcrumbs = false
  showDraftLabel = true
  showEdit = false
  # editURL = "https://github.com/username/repo/"
  editAppendPath = true
  seriesOpened = false
  showHeadingAnchors = true
  showPagination = true
  invertPagination = false
  showReadingTime = true
  showTableOfContents = true
  showRelatedContent = true
  relatedContentLimit = 12
  showTaxonomies = true # use showTaxonomies OR showCategoryOnly, not both
  showCategoryOnly = false # use showTaxonomies OR showCategoryOnly, not both
  showAuthorsBadges = true
  showWordCount = false
  # sharingLinks = [ "linkedin", "twitter", "bluesky", "mastodon", "reddit", "pinterest", "facebook", "email", "whatsapp", "telegram", "line"]
  showZenMode = false
  # externalLinkForceNewTab = false # disable to allow external links in the same tab (defaults to true)

[list]
  showHero = true
  heroStyle = "background"
  layoutBackgroundBlur = true # only used when heroStyle equals background or thumbAndBackground
  layoutBackgroundHeaderSpace = false # only used when heroStyle equals background
  showBreadcrumbs = false
  showSummary = false
  showViews = false
  showLikes = false
  showTableOfContents = true
  showCards = true
  orderByWeight = false
  groupByYear = false
  cardView = true
  cardViewScreenWidth = false
  constrainItemsWidth = false

[sitemap]
  excludedKinds = [ "taxonomy", "term" ]

# 分類法
[taxonomy]
  showTermCount = true
  showHero = true
  heroStyle = "background" # valid options: basic, big, background, thumbAndBackground
  showBreadcrumbs = false
  showViews = false
  showLikes = false
  showTableOfContents = true
  cardView = false

[term]
  showHero = false
  heroStyle = "background" # valid options: basic, big, background, thumbAndBackground
  showBreadcrumbs = false
  showViews = false
  showLikes = false
  showTableOfContents = true
  groupByYear = false
  cardView = true
  cardViewScreenWidth = false

